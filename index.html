<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IRONVAULT V8.1 // VOID_REFLECTION</title>
    <style>
        body { background: #000; color: #00FF41; font-family: monospace; margin: 0; padding: 15px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #mirror_header { border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
        #screen_container { width: 640px; height: 400px; border: 1px solid #00FF41; background: #000; margin: 20px auto; overflow: hidden; box-shadow: 0 0 15px #00FF41; }
        canvas { width: 640px; height: 400px; image-rendering: pixelated; }
        #term { flex-grow: 1; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-top: 10px; white-space: pre-wrap; background: #050505; color: #00FF41; font-size: 11px; }
        .sigil { opacity: 0.05; font-size: 8px; position: absolute; bottom: 5px; right: 5px; }
    </style>
</head>
<body>
    <div id="mirror_header">
        <span>IRONVAULT V8.1 // AUTO_VRAM_BOOT</span>
        <span id="stat-bar">[AWAITING_IGNITION]</span>
    </div>

    <div id="screen_container">
        <canvas></canvas>
    </div>

    <pre id="term">> System Initializing...
> Accessing Void Substrate...
> Locating CARRIER_STORAGE_v1.png...</pre>

    <!-- ERP_OPCODE_START -->
    <div class="sigil">
        [T1:SYNC:7561] [T2:REIFY:f00d] [T3:SHARD_S:1618] [T4:SHARD_G:7561] [T5:PULSE:6180]
    </div>
    <!-- ERP_OPCODE_END -->

    <script>
        let carrier = null;
        const PNG_PATH = "series_0010_rang_rung_repl/LATEST_STABLE_RANG_RUNG/RGB_RELATED/CARRIER_STORAGE_v1.png";

        function log(m) {
            const t = document.getElementById('term');
            t.innerText += "\n> " + m;
            t.scrollTop = t.scrollHeight;
        }

        function getAtomicBuffer(name) {
            if (!carrier) return null;
            const nameBytes = new TextEncoder().encode(name);
            for (let i = 0; i < carrier.length - nameBytes.length; i++) {
                let found = true;
                for (let j = 0; j < nameBytes.length; j++) {
                    if (carrier[i + j] !== nameBytes[j]) { found = false; break; }
                }
                if (found) {
                    const dataView = new DataView(carrier.buffer, carrier.byteOffset, carrier.byteLength);
                    // Assumption: [4-byte-length][filename][data]
                    // We search for filename (index i). Length is 4 bytes before (i-4).
                    // Data starts AFTER the filename (i + nameBytes.length).
                    const len = dataView.getUint32(i - 4, true);
                    const dataStart = i + nameBytes.length;
                    log(`Found ${name} at ${i}. Length: ${len}. Slicing from ${dataStart}...`);
                    return carrier.slice(dataStart, dataStart + len);
                }
            }
            return null;
        }

        async function autoIgnite() {
            log("Engine DNA materializing...");
            try {
                const res = await fetch(PNG_PATH);
                const blob = await res.blob();
                const bitmap = await createImageBitmap(blob, { colorSpaceConversion: 'none' });
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 961;
                const ctx = canvas.getContext('2d', { alpha: false }); 
                ctx.drawImage(bitmap, 0, 0);
                const imgData = ctx.getImageData(0, 0, 1024, 961).data;

                log("Aligning Substrate...");
                carrier = new Uint8Array((imgData.length / 4) * 3);
                for (let i = 0, j = 0; i < imgData.length; i += 4) {
                    carrier[j++] = imgData[i]; carrier[j++] = imgData[i + 1]; carrier[j++] = imgData[i + 2];
                }

                log("Extracting libv86.js...");
                const libv86Data = getAtomicBuffer("libv86.js");
                if (!libv86Data) throw new Error("libv86.js not found in carrier.");
                
                // FORENSIC CHECK
                const codeSnippet = new TextDecoder().decode(libv86Data.slice(0, 50));
                log(`Code Preview: "${codeSnippet.replace(/\n/g, ' ')}..."`);

                log("Igniting libv86...");
                const scriptBlob = new Blob([libv86Data], { type: 'application/javascript' });
                const scriptUrl = URL.createObjectURL(scriptBlob);
                const script = document.createElement('script');
                script.src = scriptUrl;
                document.head.appendChild(script);

                // Wait for script to load
                await new Promise((resolve) => { script.onload = resolve; setTimeout(resolve, 500); });

                const V86 = window.V86Starter || window.v86Starter || window.V86 || window.v86;
                if (!V86) {
                    // BRUTE FORCE SCAN
                    const keys = Object.keys(window).filter(k => k.toLowerCase().includes('v86'));
                    log(`Available V86 keys: ${keys.join(', ') || 'NONE'}`);
                    throw new Error("Class binding failed.");
                }

                log("Initializing v86 in VRAM...");
                const v86Wasm = getAtomicBuffer("v86.wasm");
                const seabios = getAtomicBuffer("seabios.bin");
                const vgabios = getAtomicBuffer("vgabios.bin");
                const bootDisk = getAtomicBuffer("freedos_boot_disk_160K.img") || getAtomicBuffer("sectorforth.img");

                const emu = new V86({
                    wasm_path: URL.createObjectURL(new Blob([v86Wasm], { type: 'application/wasm' })),
                    memory_size: 32 * 1024 * 1024,
                    vga_canvas: document.querySelector("canvas"),
                    screen_container: document.getElementById("screen_container"),
                    bios: { buffer: seabios },
                    vga_bios: { buffer: vgabios },
                    fda: { buffer: bootDisk },
                    autostart: true,
                });

                log("[SUCCESS] VM booted in VRAM!");
                document.getElementById('stat-bar').textContent = "[VM_ACTIVE_IN_VRAM]";
            } catch (e) {
                log(`Error: ${e.message}`);
                document.getElementById('stat-bar').textContent = "[ERROR]";
            }
        }
        window.addEventListener('load', autoIgnite);
    </script>
</body>
</html>
