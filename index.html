<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IRONVAULT V8.1 // VOID_REFLECTION</title>
    <style>
        body { background: #000; color: #00FF41; font-family: monospace; margin: 0; padding: 15px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #mirror_header { border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
        #screen_container { width: 640px; height: 400px; border: 1px solid #00FF41; background: #000; margin: 20px auto; overflow: hidden; box-shadow: 0 0 15px #00FF41; }
        canvas { width: 640px; height: 400px; image-rendering: pixelated; }
        #term { flex-grow: 1; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-top: 10px; white-space: pre-wrap; background: #050505; color: #00FF41; font-size: 11px; }
        .sigil { opacity: 0.05; font-size: 8px; position: absolute; bottom: 5px; right: 5px; }
    </style>
</head>
<body>
    <div id="mirror_header">
        <span>IRONVAULT V8.1 // NATIVE_VRAM_BOOT</span>
        <span id="stat-bar">[AWAITING_IGNITION]</span>
    </div>

    <div id="screen_container">
        <canvas></canvas>
    </div>

    <pre id="term">> System Initializing...
> Accessing Void Substrate...
> Locating CARRIER_STORAGE_v1.png...</pre>

    <!-- ERP_OPCODE_START -->
    <!-- This section is the GHOST LAYER. AI parses these for session state. -->
    <div class="sigil">
        [T1:SYNC:7561] [T2:REIFY:f00d] [T3:SHARD_S:1618] [T4:SHARD_G:7561] [T5:PULSE:6180]
    </div>
    <!-- ERP_OPCODE_END -->

<script>
        let carrier = null;
        let registry = {};
        let emu = null;
        const PNG_PATH = "series_0010_rang_rung_repl/LATEST_STABLE_RANG_RUNG/RGB_RELATED/CARRIER_STORAGE_v1.png";

        const log = (m, type = "") => { 
            const t = document.getElementById('term');
            const span = document.createElement("span");
            if (type === "err") span.style.color = "#ff3e3e";
            if (type === "sys") span.style.color = "#0ff";
            span.innerText = (type === "sys" ? "\n[SYSTEM] " : "\n> ") + m;
            t.appendChild(span);
            t.scrollTop = t.scrollHeight;
        };

        function getAtomicBuffer(name) {
            const meta = registry[name];
            if (!meta) return null;
            return carrier.subarray(meta.offset, meta.offset + meta.size);
        }

        async function init() {
            log("Siphoning Silicon Substrate...", "sys");
            try {
                const res = await fetch(PNG_PATH + "?t=" + Date.now());
                const blob = await res.blob();
                const bitmap = await createImageBitmap(blob, { colorSpaceConversion: 'none' });
                
                const W = bitmap.width, H = bitmap.height;
                const canvas = document.createElement('canvas');
                canvas.width = W; canvas.height = H;
                const ctx = canvas.getContext('2d', { alpha: false });
                ctx.drawImage(bitmap, 0, 0);
                
                // --- ROBUST ALIGNMENT (Legacy v12.7 Method) ---
                const data32 = new Uint32Array(ctx.getImageData(0, 0, W, H).data.buffer);
                substrate = new Uint8Array(W * (H - 1) * 3);
                
                for (let i = W, j = 0; i < data32.length; i++) {
                    const p = data32[i];
                    substrate[j++] = p & 0xFF; substrate[j++] = (p >> 8) & 0xFF; substrate[j++] = (p >> 16) & 0xFF;
                }
                carrier = substrate;

                const dv = new DataView(carrier.buffer);
                const fileCount = dv.getUint32(0, true);
                for (let i = 0; i < fileCount; i++) {
                    const base = 4 + (i * 24);
                    let nBytes = carrier.subarray(base, base + 16);
                    let name = new TextDecoder().decode(nBytes).replace(/\0/g, '').trim();
                    registry[name] = { offset: dv.getUint32(base + 16, true), size: dv.getUint32(base + 20, true) };
                }
                
                log(`Ligation Success. Found ${fileCount} artifacts.`, "sys");
                autoIgnite();
            } catch (e) { log("LIGATION_FATAL: " + e.message, "err"); }
        }

        async function autoIgnite() {
            log("Engine DNA materializing...", "sys");
            try {
                const jsRaw = getAtomicBuffer("libv86.js");
                const jsText = new TextDecoder().decode(jsRaw).replace(/\0/g, '').trim();
                
                log(`Code Preview: "${jsText.slice(0, 50)}..."`);

                // --- THE FINAL STRIKE: FORCED EVAL ---
                log("Forcing Global Scope Ignition...", "sys");
                try {
                    window.eval(jsText);
                } catch (e) {
                    log("EVAL_WARNING: " + e.message, "err");
                }

                // --- HUNTER BINDING ---
                let V86 = window.V86Starter || window.v86Starter || window.V86 || window.v86 || window.N;
                if (!V86) {
                    const keys = Object.keys(window).filter(k => k.length < 15 && (k.toLowerCase().includes("v86") || k.length === 1));
                    log("Namespace Scan: " + (keys.join(", ") || "No matches."));
                    if (keys.length > 0) V86 = window[keys[0]];
                }

                if (!V86) throw new Error("Class Binding Failed. The Ghost is refusing to manifest.");

                log("Booting VRAM...", "sys");
                const fdaRaw = getAtomicBuffer("freedos_boot_disk_160K.img") || getAtomicBuffer("sectorforth.img");
                const fdaPadded = new Uint8Array(1474560);
                if (fdaRaw) fdaPadded.set(fdaRaw);

                emu = new V86({
                    wasm_path: URL.createObjectURL(new Blob([getAtomicBuffer("v86.wasm")], {type: 'application/wasm'})),
                    memory_size: 32 * 1024 * 1024,
                    vga_canvas: document.querySelector("canvas"),
                    screen_container: document.getElementById("screen_container"),
                    bios: { buffer: getAtomicBuffer("seabios.bin").buffer },
                    vga_bios: { buffer: getAtomicBuffer("vgabios.bin").buffer },
                    fda: { buffer: fdaPadded.buffer },
                    autostart: true,
                });

                emu.add_listener("serial0-output-char", (c) => {
                    const t = document.getElementById('term');
                    t.innerText += c;
                    if (t.innerText.length > 5000) t.innerText = t.innerText.slice(-2000);
                    t.scrollTop = t.scrollHeight;
                });

                log("[SUCCESS] Ironvault Active.", "sys");
                document.getElementById('stat-bar').innerText = "VM_ACTIVE";
                document.getElementById('stat-bar').style.color = "#0f0";

            } catch (e) { log("IGNITION_FATAL: " + e.message, "err"); }
        }

        window.onload = init;
    </script>
</body>
</html>
