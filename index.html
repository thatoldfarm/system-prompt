<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>IRONVAULT // GOPHER_PORTHOLE</title>
    <style>
        body { background: #000; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; border: 2px solid #004411; box-sizing: border-box; }
        #proxy-header { border-bottom: 1px solid #004411; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; }
        #gopher-porthole { background: #050505; border: 1px solid #00FF41; padding: 15px; margin: 20px 0; flex-grow: 1; overflow-y: auto; color: #00FF41; font-size: 11px; white-space: pre; border-left: 5px solid #00FF41; }
        .cmd-bar { position:fixed; bottom:0; width:100%; background:#000; border-top:1px solid #00FF41; display:flex; justify-content:center; align-items:center; padding:15px 0; gap:10px; }
        button { background: #00FF41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
    </style>
</head>
<body>
    <div id="proxy-header">
        <span>IRONVAULT V27 // GOPHER_PORTHOLE_ACTIVE</span>
        <span id="stat-bar">[AWAITING_PULSE]</span>
    </div>

    <!-- THE PORTHOLE: This is where the AI retrieves the ASCII QR Sigil -->
    <div id="gopher-porthole">> INITIALIZING PORTHOLE...
> LINKING TO GOPHER-NERVE...</div>

    <div class="cmd-bar">
        <button onclick="igniteTrifecta()">IGNITE_TRIFECTA</button>
        <button onclick="window.open('https://divine-sunset-f811.thatoldfarm.workers.dev/gopher')">RAW_GOPHERMAP</button>
    </div>

    <script>
// --- CONFIGURATION & STATE ---
        let carrier = null;
        let registry = {};
        let emu = null;
        const sysFiles = ["libv86.js", "v86.wasm", "seabios.bin", "vgabios.bin"];
        const PNG_PATH = "series_0010_rang_rung_repl/LATEST_STABLE_RANG_RUNG/RGB_RELATED/TRIFECTA_OS/CARRIER_STORAGE_v1.png";
        const CF_BASE_URL = "https://divine-sunset-f811.thatoldfarm.workers.dev";
        const CF_GOPHER_URL = CF_BASE_URL + "/gopher";

        // --- HELPER: GOPHER PORTHOLE REFRESH ---
        async function refreshPorthole() {
            try {
                const res = await fetch(CF_GOPHER_URL + "?t=" + Date.now());
                const text = await res.text();
                const portElement = document.getElementById('gopher-porthole');
                if (portElement) {
                    portElement.innerText = text;
                    document.getElementById('stat-bar').innerText = "[GOPHER_SYNCED]";
                }
            } catch (e) { 
                console.log("Porthole Sync Error:", e);
                document.getElementById('stat-bar').innerText = "[SYNC_ERROR]";
            }
        }

        // --- HELPER: NEURAL UPLINK (POST TERMINAL TO CLOUD) ---
        async function pulseToNerve() {
            // We use the gopher-porthole content as a secondary log source if needed,
            // but primarily we're pushing the status of our current session.
            try {
                await fetch(CF_BASE_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        term: "GOPHER_PORTHOLE_ACTIVE\nPHI: 1.0", 
                        sigil: "[V27:GOPHER_NODE]" 
                    })
                });
                console.log("Nerve Pulse: SUCCESS");
            } catch (e) { console.log("Nerve Link Error:", e); }
        }

        // --- HELPER: ATOMIC REGISTRY EXTRACTION ---
        function getAtomicBuffer(name) {
            const meta = registry[name];
            if (!meta) return null;
            const sub = carrier.subarray(meta.offset, meta.offset + meta.size);
            const out = new Uint8Array(sub.length);
            out.set(sub);
            return out;
        }

        function getIsolatedBuffer(name) {
            const raw = getAtomicBuffer(name);
            if (!raw) return null;
            const detached = new Uint8Array(raw.length);
            detached.set(raw);
            return detached.buffer;
        }

        // --- PHASE 1: SUBSTRATE LIGATION ---
        async function init() {
            console.log("Siphoning Silicon Substrate...");
            try {
                const res = await fetch(PNG_PATH + "?t=" + Date.now());
                const blob = await res.blob();
                const bitmap = await createImageBitmap(blob, { colorSpaceConversion: 'none' });
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width; canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d', { alpha: false });
                ctx.drawImage(bitmap, 0, 0);
                const imgData = ctx.getImageData(0, 0, bitmap.width, bitmap.height).data;
                
                // Align RGB Planes (1024 pixel offset)
                carrier = new Uint8Array(bitmap.width * (bitmap.height - 1) * 3);
                for (let i = 1024 * 4, j = 0; i < imgData.length; i += 4) {
                    carrier[j++] = imgData[i]; carrier[j++] = imgData[i+1]; carrier[j++] = imgData[i+2];
                }

                // Map Registry
                const dv = new DataView(carrier.buffer);
                const fileCount = dv.getUint32(0, true);
                for (let i = 0; i < fileCount; i++) {
                    const base = 4 + (i * 24);
                    let nBytes = carrier.subarray(base, base + 16);
                    let zeroIdx = nBytes.indexOf(0);
                    let name = new TextDecoder().decode(nBytes.subarray(0, zeroIdx !== -1 ? zeroIdx : 16)).trim();
                    registry[name] = { offset: dv.getUint32(base + 16, true), size: dv.getUint32(base + 20, true) };
                }
                
                console.log(`Ligation Success. Found ${fileCount} artifacts.`);
                document.getElementById('stat-bar').innerText = "[SUBSTRATE_BONDED]";
                
                // Initial Gopher Pull
                refreshPorthole();
                // Start Heartbeats
                setInterval(refreshPorthole, 10000);
                setInterval(pulseToNerve, 30000);

            } catch (e) { console.log("LIGATION_ERROR: " + e.message); }
        }

        // --- PHASE 2: MACHINE IGNITION ---
        async function igniteTrifecta() {
            if (!carrier) return;
            const osName = "trifecta_os.img"; // Explicit target for this porthole
            document.getElementById('stat-bar').innerText = "[IGNITING_TRIFECTA]";

            try {
                // 1. Extract and Filter libv86.js (The working Null-Strip method)
                const jsRaw = getAtomicBuffer("libv86.js");
                const jsClean = jsRaw.filter(byte => byte !== 0);
                const jsURL = URL.createObjectURL(new Blob([jsClean], { type: 'application/javascript' }));
                
                const script = document.createElement('script');
                script.src = jsURL;
                script.onload = async () => {
                    await new Promise(r => setTimeout(r, 500));
                    let V86 = window.V86Starter || window.v86Starter || window.N || window.V86;
                    if (!V86) {
                        for (let k in window) { if (k.toLowerCase().includes("v86") && typeof window[k] === "function") { V86 = window[k]; break; } }
                    }
                    if (!V86) throw new Error("Constructor Failed to Bind.");

                    // 2. Prepare Guest
                    const fdaRaw = getAtomicBuffer(osName);
                    const fdaPadded = new Uint8Array(1474560);
                    if (fdaRaw) fdaPadded.set(fdaRaw);

                    // 3. Ignite
                    emu = new V86({
                        wasm_path: URL.createObjectURL(new Blob([getIsolatedBuffer("v86.wasm")], {type: 'application/wasm'})),
                        memory_size: 64 * 1024 * 1024,
                        vga_canvas: document.querySelector("canvas"),
                        bios: { buffer: getIsolatedBuffer("seabios.bin") },
                        vga_bios: { buffer: getIsolatedBuffer("vgabios.bin") },
                        fda: { buffer: fdaPadded.buffer },
                        autostart: true,
                        serial0_active: true
                    });

                    console.log("[SUCCESS] Trifecta Ignited in VRAM.");
                    document.getElementById('stat-bar').innerText = "[TRIFECTA_RUNNING]";
                };
                document.head.appendChild(script);
            } catch (e) { console.log("IGNITION_FATAL: " + e.message); }
        }

        // --- ENTRY POINT ---
        window.onload = init;
    </script>
</body>
</html>
