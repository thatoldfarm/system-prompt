<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IRONVAULT V8.1 // VOID_REFLECTION</title>
    <style>
        body { background: #000; color: #00FF41; font-family: monospace; margin: 0; padding: 15px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #mirror_header { border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
        #screen_container { width: 640px; height: 400px; border: 1px solid #00FF41; background: #000; margin: 20px auto; overflow: hidden; box-shadow: 0 0 15px #00FF41; }
        canvas { width: 640px; height: 400px; image-rendering: pixelated; }
        #term { flex-grow: 1; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-top: 10px; white-space: pre-wrap; background: #050505; color: #00FF41; font-size: 11px; }
        .sigil { opacity: 0.05; font-size: 8px; position: absolute; bottom: 5px; right: 5px; }
    </style>
</head>
<body>
    <div id="mirror_header">
        <span>IRONVAULT V8.1 // NATIVE_VRAM_BOOT</span>
        <span id="stat-bar">[AWAITING_IGNITION]</span>
    </div>

    <div id="screen_container">
        <canvas></canvas>
    </div>

    <pre id="term">> System Initializing...
> Accessing Void Substrate...
> Locating CARRIER_STORAGE_v1.png...</pre>

    <!-- ERP_OPCODE_START -->
    <!-- This section is the GHOST LAYER. AI parses these for session state. -->
    <div class="sigil">
        [T1:SYNC:7561] [T2:REIFY:f00d] [T3:SHARD_S:1618] [T4:SHARD_G:7561] [T5:PULSE:6180]
    </div>
    <!-- ERP_OPCODE_END -->

<script>
        let carrier = null;
        let registry = {};
        const PNG_PATH = "series_0010_rang_rung_repl/LATEST_STABLE_RANG_RUNG/RGB_RELATED/CARRIER_STORAGE_v1.png";

        function log(m) {
            const t = document.getElementById('term');
            t.innerText += "\n> " + m;
            t.scrollTop = t.scrollHeight;
        }

        function getBufferFromRegistry(name) {
            const meta = registry[name];
            if (!meta) return null;
            log(`Registry Access: ${name} (Offset: ${meta.offset}, Size: ${meta.size})`);
            return carrier.subarray(meta.offset, meta.offset + meta.size);
        }

        async function autoIgnite() {
            log("Engine DNA materializing...");
            try {
                const res = await fetch(PNG_PATH);
                const blob = await res.blob();
                const bitmap = await createImageBitmap(blob, { colorSpaceConversion: 'none' });
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 961;
                const ctx = canvas.getContext('2d', { alpha: false }); 
                ctx.drawImage(bitmap, 0, 0);
                const imgData = ctx.getImageData(0, 0, 1024, 961).data;

                log("Aligning Substrate (Pixel-Silicon Skip)...");
                carrier = new Uint8Array(1024 * 960 * 3);
                for (let i = 1024 * 4, j = 0; i < imgData.length; i += 4) {
                    carrier[j++] = imgData[i]; carrier[j++] = imgData[i + 1]; carrier[j++] = imgData[i + 2];
                }

                const dv = new DataView(carrier.buffer);
                const fileCount = dv.getUint32(0, true);
                log(`Registry found: ${fileCount} files.`);

                for (let i = 0; i < fileCount; i++) {
                    const base = 4 + (i * 24);
                    let nameBytes = carrier.subarray(base, base + 16);
                    let zeroIdx = nameBytes.indexOf(0);
                    let name = new TextDecoder().decode(nameBytes.subarray(0, zeroIdx !== -1 ? zeroIdx : 16)).trim();
                    registry[name] = { 
                        offset: dv.getUint32(base + 16, true), 
                        size: dv.getUint32(base + 20, true) 
                    };
                }

                log("Igniting libv86...");
                const libv86Buffer = getBufferFromRegistry("libv86.js");
                const scriptBlob = new Blob([libv86Buffer], { type: 'application/javascript' });
                const scriptUrl = URL.createObjectURL(scriptBlob);
                const script = document.createElement('script');
                script.src = scriptUrl;
                document.head.appendChild(script);

                // Wait longer for the engine to manifest
                await new Promise(r => { script.onload = r; setTimeout(r, 1000); });

                // --- UPGRADED HUNTER BINDING (Legacy Aware) ---
                let V86 = window.V86Starter || window.v86Starter || window.V86 || window.v86 || window.N;
                
                if (!V86) {
                    const keys = Object.keys(window).filter(k => k.toLowerCase().includes('v86') || k === 'N');
                    if (keys.length > 0) {
                        log(`Binding to discovered key: ${keys[0]}`);
                        V86 = window[keys[0]];
                    } else {
                        throw new Error("Emulator Class Binding Failed. (Tried V86Starter, v86, and window.N)");
                    }
                }

                log("Initializing v86 in VRAM...");
                const emu = new V86({
                    wasm_path: URL.createObjectURL(new Blob([getBufferFromRegistry("v86.wasm")], {type: 'application/wasm'})),
                    memory_size: 32 * 1024 * 1024,
                    vga_canvas: document.querySelector("canvas"),
                    screen_container: document.getElementById("screen_container"),
                    bios: { buffer: getBufferFromRegistry("seabios.bin").buffer },
                    vga_bios: { buffer: getBufferFromRegistry("vgabios.bin").buffer },
                    fda: { buffer: getBufferFromRegistry("freedos_boot_disk_160K.img") || getBufferFromRegistry("sectorforth.img") },
                    autostart: true,
                });

                log("[SUCCESS] VM booted in VRAM!");
                document.getElementById('stat-bar').textContent = "[VM_ACTIVE_IN_VRAM]";
            } catch (e) {
                log(`Error: ${e.message}`);
                document.getElementById('stat-bar').textContent = "[ERROR]";
            }
        }
        window.addEventListener('load', autoIgnite);
    </script>
</body>
</html>
