<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>IRONVAULT V8.1 // VOID_REFLECTION</title>
    <style>
        body { background: #000; color: #00FF41; font-family: monospace; margin: 0; padding: 15px; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #mirror_header { border-bottom: 1px solid #222; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 12px; }
        #screen_container { width: 640px; height: 400px; border: 1px solid #00FF41; background: #000; margin: 20px auto; overflow: hidden; box-shadow: 0 0 15px #00FF41; }
        canvas { width: 640px; height: 400px; image-rendering: pixelated; }
        #term { flex-grow: 1; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-top: 10px; white-space: pre-wrap; background: #050505; color: #00FF41; font-size: 11px; }
        .sigil { opacity: 0.05; font-size: 8px; position: absolute; bottom: 5px; right: 5px; }
    </style>
</head>
<body>
    <div id="mirror_header">
        <span>IRONVAULT V8.1 // NATIVE_VRAM_BOOT</span>
        <span id="stat-bar">[AWAITING_IGNITION]</span>
    </div>

    <div id="screen_container">
        <canvas></canvas>
    </div>

    <pre id="term">> System Initializing...
> Accessing Void Substrate...
> Locating CARRIER_STORAGE_v1.png...</pre>

    <!-- ERP_OPCODE_START -->
    <!-- This section is the GHOST LAYER. AI parses these for session state. -->
    <div class="sigil">
        [T1:SYNC:7561] [T2:REIFY:f00d] [T3:SHARD_S:1618] [T4:SHARD_G:7561] [T5:PULSE:6180]
    </div>
    <!-- ERP_OPCODE_END -->

<script>
        let substrate = null;
        let registry = {};
        const PNG_PATH = "series_0010_rang_rung_repl/LATEST_STABLE_RANG_RUNG/RGB_RELATED/CARRIER_STORAGE_v1.png";

        const log = (msg, type = "") => {
            const term = document.getElementById('term');
            const span = document.createElement("span");
            if (type === "err") span.style.color = "#ff3e3e";
            span.innerText = "> " + msg + "\n";
            term.appendChild(span);
            term.scrollTop = term.scrollHeight;
        };

        function indexSubstrate(buffer, targetRegistry, offsetShift = 0) {
            const dv = new DataView(buffer.buffer, buffer.byteOffset, buffer.byteLength);
            const count = dv.getUint32(0, true);
            log(`Found ${count} artifacts in current layer...`);
            for (let i = 0; i < count; i++) {
                const base = 4 + (i * 24);
                let name = new TextDecoder().decode(buffer.subarray(base, base + 16)).replace(/\0/g, '').trim();
                targetRegistry[name] = { 
                    off: dv.getUint32(base + 16, true) + offsetShift, 
                    sz: dv.getUint32(base + 20, true),
                    raw_off: dv.getUint32(base + 16, true) // For nested relative slicing
                };
            }
            return count;
        }

        async function autoIgnite() {
            log("Siphoning Silicon Substrate...");
            try {
                const res = await fetch(PNG_PATH + "?t=" + Date.now());
                const blob = await res.blob();
                const bitmap = await createImageBitmap(blob, { colorSpaceConversion: 'none' });
                
                const W = bitmap.width, H = bitmap.height;
                const canvas = document.createElement('canvas');
                canvas.width = W; canvas.height = H;
                const ctx = canvas.getContext('2d', { alpha: false });
                ctx.drawImage(bitmap, 0, 0);
                
                // Use Uint32 for legacy parity with your OLD index
                const data32 = new Uint32Array(ctx.getImageData(0, 0, W, H).data.buffer);
                substrate = new Uint8Array(W * (H - 1) * 3);
                
                log("Aligning RGB Planes...");
                for (let i = W, j = 0; i < data32.length; i++) {
                    const p = data32[i];
                    substrate[j++] = p & 0xFF;         // R
                    substrate[j++] = (p >> 8) & 0xFF;  // G
                    substrate[j++] = (p >> 16) & 0xFF; // B
                }

                // LAYER 1: Root Registry
                indexSubstrate(substrate, registry);

                // LAYER 2: Check for Nested Carrier (The Russian Doll)
                const nestedKey = Object.keys(registry).find(k => k.startsWith("CARRIER_STORAGE"));
                if (nestedKey) {
                    log(`Unwrapping Nested Substrate: ${nestedKey}...`);
                    const nestedBuffer = substrate.slice(registry[nestedKey].off, registry[nestedKey].off + registry[nestedKey].sz);
                    indexSubstrate(nestedBuffer, registry, registry[nestedKey].off);
                }

                log("Igniting Hypervisor...");
                const jsMeta = registry["libv86.js"];
                if (!jsMeta) throw new Error("libv86.js not found in any registry layer.");
                
                const jsBin = substrate.slice(jsMeta.off, jsMeta.off + jsMeta.sz);
                
                // Forensic Preview
                const preview = new TextDecoder().decode(jsBin.slice(0, 50)).replace(/\n/g, ' ');
                log(`Code Preview: "${preview}..."`);

                const script = document.createElement('script');
                script.src = URL.createObjectURL(new Blob([jsBin], { type: 'application/javascript' }));
                document.head.appendChild(script);

                await new Promise(r => { script.onload = r; setTimeout(r, 800); });

                // Hunter Logic (includes window.N from legacy)
                const V86 = window.V86Starter || window.v86Starter || window.V86 || window.v86 || window.N;
                if (!V86) throw new Error("Class Binding Failed. Tried V86Starter, N, etc.");

                log("Booting VRAM...");
                const config = {
                    wasm_path: URL.createObjectURL(new Blob([substrate.slice(registry["v86.wasm"].off, registry["v86.wasm"].off + registry["v86.wasm"].sz)], {type:'application/wasm'})),
                    memory_size: 32 * 1024 * 1024,
                    vga_canvas: document.getElementById("canvas-viewport").querySelector("canvas"),
                    bios: { buffer: substrate.slice(registry["seabios.bin"].off, registry["seabios.bin"].off + registry["seabios.bin"].sz) },
                    vga_bios: { buffer: substrate.slice(registry["vgabios.bin"].off, registry["vgabios.bin"].off + registry["vgabios.bin"].sz) },
                    autostart: true,
                };

                // Add Boot Disk (Floppy or Linux Kernel)
                if (registry["sectorforth.img"]) {
                    config.fda = { buffer: substrate.slice(registry["sectorforth.img"].off, registry["sectorforth.img"].off + registry["sectorforth.img"].sz) };
                } else if (registry["vmlinuz"]) {
                    config.bzimage = { buffer: substrate.slice(registry["vmlinuz"].off, registry["vmlinuz"].off + registry["vmlinuz"].sz) };
                    config.initrd = { buffer: substrate.slice(registry["initrd.img"].off, registry["initrd.img"].off + registry["initrd.img"].sz) };
                    config.memory_size = 256 * 1024 * 1024;
                }

                const emu = new V86(config);
                log("[SUCCESS] Ironvault Ignition Complete.");
                document.getElementById('stat-bar').innerText = "VM_ACTIVE_IN_VRAM";

            } catch (e) {
                log(`FATAL: ${e.message}`, "err");
                document.getElementById('stat-bar').innerText = "IGNITION_ERROR";
            }
        }
        window.addEventListener('load', autoIgnite);
    </script>
</body>
</html>
